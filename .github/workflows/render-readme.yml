name: Render README

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  render-readme:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/${{ github.repository }}:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Render README.qmd
        run: quarto render README.qmd

      - name: Detect README.md changes
        id: readme_changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- README.md)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit rendered README.md
        if: steps.readme_changes.outputs.changed == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add README.md
          git commit -m "chore: render README from README.qmd [skip ci]"
          git push origin "HEAD:${BRANCH_NAME}"
